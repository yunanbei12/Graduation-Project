<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体育教培机构 - 小程序原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 15px;
        }
        .screens-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 15px;
            max-width: 3600px;
            margin: 0 auto 20px;
        }
        .phone {
            aspect-ratio: 430/932;
            background: #1a1a1a;
            border-radius: 35px;
            padding: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .phone:hover { transform: translateY(-5px); box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 25px;
            background: #1a1a1a;
            border-radius: 0 0 15px 15px;
            z-index: 10;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            border-radius: 28px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .screen::-webkit-scrollbar { width: 3px; }
        .screen::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 2px; }
        .label {
            text-align: center;
            color: white;
            font-size: 11px;
            margin-top: 8px;
            font-weight: 500;
        }
        .title {
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .bg-primary { background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%); }
        .text-primary { color: #ff6b35; }
        .btn {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .card {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 30px;
            overflow-y: auto;
        }
        .modal.active { display: flex; }
        .modal-phone {
            width: 430px;
            height: 932px;
            background: #1a1a1a;
            border-radius: 40px;
            padding: 12px;
            position: relative;
            flex-shrink: 0;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .close-btn:hover { background: #f0f0f0; }
        .modal-screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 32px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .modal-screen::-webkit-scrollbar { width: 4px; }
        .modal-screen::-webkit-scrollbar-thumb { background: #ff6b35; border-radius: 2px; }
    </style>
</head>
<body>

                                    <button style="padding: 12px; background: ${i === 0 ? 'linear-gradient(135deg, #ff6b35, #ff8c42)' : '#f0f0f0'}; color: ${i === 0 ? 'white' : '#666'}; border: none; border-radius: 10px; font-size: 13px; font-weight: 600;">
                                        ${type}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div class="card" style="margin-bottom: 30px;">
                            <h3 style="font-weight: bold; font-size: 15px; margin-bottom: 12px;">价格区间</h3>
                            <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                                ${['500-1000元', '1000-2000元', '2000元以上'].map((price, i) => `
                                    <button style="padding: 12px; background: ${i === 1 ? 'linear-gradient(135deg, #ff6b35, #ff8c42)' : '#f0f0f0'}; color: ${i === 1 ? 'white' : '#666'}; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; text-align: left;">
                                        <i class="fas fa-yen-sign"></i> ${price}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button style="flex: 1; padding: 15px; background: #f0f0f0; color: #666; border: none; border-radius: 25px; font-size: 15px; font-weight: 600;">
                                跳过
                            </button>
                            <button class="btn" style="flex: 2; padding: 15px; font-size: 15px;">
                                开始探索
                            </button>
                        </div>
                    </div>
                `
            };
            return contents[id] || '<div style="padding: 50px 20px; text-align: center; color: #999;">页面开发中...</div>';
        }

        function renderPages() {
            const grid = document.getElementById('grid');
            pages.forEach(page => {
                const phoneDiv = document.createElement('div');
                phoneDiv.className = 'phone';
                phoneDiv.onclick = () => showDetail(page.id);
                phoneDiv.innerHTML = `
                    <div class="notch"></div>
                    <div class="screen">${getPageContent(page.id)}</div>
                    <div class="label">${page.name}</div>
                `;
                grid.appendChild(phoneDiv);
            });
        }

        function showDetail(pageId) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = getPageContent(pageId);
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 初始化
        renderPages();

        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 点击模态框背景关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
</html>
