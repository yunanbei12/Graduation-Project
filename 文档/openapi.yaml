openapi: 3.0.3
info:
  title: 体育教培机构管理系统 API
  version: v1.0.0
  description: |
    基于《需求分析文档》《系统架构设计文档》《数据库详细设计文档》《API接口设计文档》生成的 OpenAPI 规范文件。
    本规范覆盖小程序端、后台管理端与第三方回调接口，适用于 Swagger UI、Knife4j、OpenAPI Generator 等工具。
servers:
  - url: http://localhost:8080
    description: 本地开发环境
  - url: https://api.example.com
    description: 生产环境示例地址
tags:
  - name: AppAuth
  - name: AppHome
  - name: AppRecommend
  - name: AppCourse
  - name: AppGroupOrder
  - name: AppOrder
  - name: AppRefund
  - name: AppLesson
  - name: AppCoupon
  - name: AppProduct
  - name: AppMoment
  - name: AppAI
  - name: AppGrowth
  - name: AdminAuth
  - name: AdminDashboard
  - name: AdminCourse
  - name: AdminStudent
  - name: AdminCoach
  - name: AdminSchedule
  - name: AdminGroupOrder
  - name: AdminCoupon
  - name: AdminOrder
  - name: AdminProduct
  - name: AdminMoment
  - name: AdminGrowth
  - name: AdminAI
  - name: AdminFinance
  - name: AdminFile
  - name: OpenCallback
security:
  - bearerAuth: []
paths:
  /api/app/v1/auth/wx-login:
    post:
      tags: [AppAuth]
      summary: 微信登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WxLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthLoginResponse'
  /api/app/v1/auth/me:
    get:
      tags: [AppAuth]
      summary: 获取当前小程序用户信息
      responses:
        '200':
          $ref: '#/components/responses/UserProfileResponse'
  /api/app/v1/auth/profile:
    put:
      tags: [AppAuth]
      summary: 更新小程序用户资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppProfileUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/admin/v1/auth/login:
    post:
      tags: [AdminAuth]
      summary: 后台登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AdminLoginResponse'
  /api/admin/v1/auth/me:
    get:
      tags: [AdminAuth]
      summary: 获取后台当前登录信息
      responses:
        '200':
          $ref: '#/components/responses/AdminProfileResponse'
  /api/admin/v1/auth/logout:
    post:
      tags: [AdminAuth]
      summary: 后台退出登录
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/app/v1/home/index:
    get:
      tags: [AppHome]
      summary: 首页聚合数据
      security: []
      parameters:
        - name: lat
          in: query
          schema:
            type: number
            format: double
        - name: lng
          in: query
          schema:
            type: number
            format: double
      responses:
        '200':
          $ref: '#/components/responses/HomeIndexResponse'

  /api/app/v1/recommend/courses:
    get:
      tags: [AppRecommend]
      summary: 获取推荐课程
      security: []
      parameters:
        - name: scene
          in: query
          required: true
          schema:
            type: string
            example: home
        - name: size
          in: query
          schema:
            type: integer
            default: 5
      responses:
        '200':
          $ref: '#/components/responses/CourseListResponse'
  /api/app/v1/recommend/preferences:
    post:
      tags: [AppRecommend]
      summary: 提交兴趣选座偏好
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendPreferenceRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/app/v1/courses:
    get:
      tags: [AppCourse]
      summary: 课程列表
      security: []
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
        - name: courseType
          in: query
          schema:
            type: integer
        - name: sportType
          in: query
          schema:
            type: string
        - name: priceMin
          in: query
          schema:
            type: number
            format: double
        - name: priceMax
          in: query
          schema:
            type: number
            format: double
        - name: location
          in: query
          schema:
            type: string
        - name: sortType
          in: query
          schema:
            type: string
            enum: [recommend, sales, priceAsc, latest]
      responses:
        '200':
          $ref: '#/components/responses/CoursePageResponse'
  /api/app/v1/courses/{courseId}:
    get:
      tags: [AppCourse]
      summary: 课程详情
      security: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          $ref: '#/components/responses/CourseDetailResponse'
  /api/app/v1/courses/{courseId}/schedules:
    get:
      tags: [AppCourse]
      summary: 团课排期列表
      security: []
      parameters:
        - $ref: '#/components/parameters/CourseId'
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          $ref: '#/components/responses/ScheduleListResponse'

  /api/app/v1/group-orders:
    get:
      tags: [AppGroupOrder]
      summary: 拼团列表
      security: []
      parameters:
        - name: groupType
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/GroupOrderPageResponse'
    post:
      tags: [AppGroupOrder]
      summary: 发起拼团
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/GroupCreateResponse'
  /api/app/v1/group-orders/{groupOrderId}:
    get:
      tags: [AppGroupOrder]
      summary: 拼团详情
      security: []
      parameters:
        - $ref: '#/components/parameters/GroupOrderId'
      responses:
        '200':
          $ref: '#/components/responses/GroupOrderDetailResponse'
  /api/app/v1/group-orders/{groupOrderId}/join:
    post:
      tags: [AppGroupOrder]
      summary: 参与拼团
      parameters:
        - $ref: '#/components/parameters/GroupOrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGroupOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/GroupCreateResponse'

  /api/app/v1/orders/preview:
    post:
      tags: [AppOrder]
      summary: 订单预览
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPreviewRequest'
      responses:
        '200':
          $ref: '#/components/responses/OrderPreviewResponse'
  /api/app/v1/orders:
    get:
      tags: [AppOrder]
      summary: 小程序订单列表
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
        - name: orderStatus
          in: query
          schema:
            type: integer
        - name: orderType
          in: query
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/OrderPageResponse'
    post:
      tags: [AppOrder]
      summary: 创建订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/OrderCreateResponse'
  /api/app/v1/orders/{orderId}:
    get:
      tags: [AppOrder]
      summary: 订单详情
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          $ref: '#/components/responses/OrderDetailResponse'
  /api/app/v1/orders/{orderId}/pay:
    post:
      tags: [AppOrder]
      summary: 获取微信支付参数
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          $ref: '#/components/responses/PaymentParamResponse'
  /api/app/v1/orders/{orderId}/cancel:
    post:
      tags: [AppOrder]
      summary: 取消订单
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
  /api/app/v1/orders/{orderId}/confirm-receipt:
    post:
      tags: [AppOrder]
      summary: 确认收货
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/app/v1/refunds/preview:
    get:
      tags: [AppRefund]
      summary: 退款预计算
      parameters:
        - $ref: '#/components/parameters/OrderIdQuery'
      responses:
        '200':
          $ref: '#/components/responses/RefundPreviewResponse'
  /api/app/v1/refunds:
    get:
      tags: [AppRefund]
      summary: 我的退款列表
      responses:
        '200':
          $ref: '#/components/responses/RefundPageResponse'
    post:
      tags: [AppRefund]
      summary: 发起退款申请
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
      responses:
        '200':
          $ref: '#/components/responses/RefundDetailResponse'
  /api/app/v1/refunds/{refundId}:
    get:
      tags: [AppRefund]
      summary: 退款详情
      parameters:
        - $ref: '#/components/parameters/RefundId'
      responses:
        '200':
          $ref: '#/components/responses/RefundDetailResponse'

  /api/app/v1/lessons:
    get:
      tags: [AppLesson]
      summary: 我的课包列表
      responses:
        '200':
          $ref: '#/components/responses/LessonPageResponse'
  /api/app/v1/lessons/{lessonId}:
    get:
      tags: [AppLesson]
      summary: 课时详情
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          $ref: '#/components/responses/LessonDetailResponse'
  /api/app/v1/lesson-records:
    get:
      tags: [AppLesson]
      summary: 销课记录列表
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
        - name: lessonId
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/LessonRecordPageResponse'

  /api/app/v1/coupons/my:
    get:
      tags: [AppCoupon]
      summary: 我的优惠券
      responses:
        '200':
          $ref: '#/components/responses/CouponPageResponse'
  /api/app/v1/coupons/{couponId}/receive:
    post:
      tags: [AppCoupon]
      summary: 领取优惠券
      parameters:
        - $ref: '#/components/parameters/CouponId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/app/v1/products:
    get:
      tags: [AppProduct]
      summary: 商品列表
      security: []
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
        - name: categoryId
          in: query
          schema:
            type: integer
            format: int64
        - name: keyword
          in: query
          schema:
            type: string
        - name: sortType
          in: query
          schema:
            type: string
            enum: [sales, new, priceAsc, priceDesc]
      responses:
        '200':
          $ref: '#/components/responses/ProductPageResponse'
  /api/app/v1/products/{productId}:
    get:
      tags: [AppProduct]
      summary: 商品详情
      security: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          $ref: '#/components/responses/ProductDetailResponse'
  /api/app/v1/cart:
    get:
      tags: [AppProduct]
      summary: 购物车列表
      responses:
        '200':
          $ref: '#/components/responses/CartListResponse'
  /api/app/v1/cart/items:
    post:
      tags: [AppProduct]
      summary: 加入购物车
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCartItemRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
  /api/app/v1/cart/items/{cartItemId}:
    put:
      tags: [AppProduct]
      summary: 修改购物车项
      parameters:
        - $ref: '#/components/parameters/CartItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    delete:
      tags: [AppProduct]
      summary: 删除购物车项
      parameters:
        - $ref: '#/components/parameters/CartItemId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/app/v1/moments:
    get:
      tags: [AppMoment]
      summary: 动态列表
      security: []
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/MomentPageResponse'
  /api/app/v1/moments/{momentId}:
    get:
      tags: [AppMoment]
      summary: 动态详情
      security: []
      parameters:
        - $ref: '#/components/parameters/MomentId'
      responses:
        '200':
          $ref: '#/components/responses/MomentDetailResponse'
  /api/app/v1/moments/{momentId}/like:
    post:
      tags: [AppMoment]
      summary: 动态点赞
      parameters:
        - $ref: '#/components/parameters/MomentId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    delete:
      tags: [AppMoment]
      summary: 取消动态点赞
      parameters:
        - $ref: '#/components/parameters/MomentId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
  /api/app/v1/moments/{momentId}/comments:
    get:
      tags: [AppMoment]
      summary: 动态评论列表
      security: []
      parameters:
        - $ref: '#/components/parameters/MomentId'
      responses:
        '200':
          $ref: '#/components/responses/MomentCommentPageResponse'
    post:
      tags: [AppMoment]
      summary: 发表评论
      parameters:
        - $ref: '#/components/parameters/MomentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMomentCommentRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/app/v1/ai/chat:
    post:
      tags: [AppAI]
      summary: AI 客服提问
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiChatRequest'
      responses:
        '200':
          $ref: '#/components/responses/AiChatResponse'
  /api/app/v1/ai/faqs:
    get:
      tags: [AppAI]
      summary: 常见问题列表
      security: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/FaqListResponse'
  /api/app/v1/ai/chat-logs:
    get:
      tags: [AppAI]
      summary: AI 会话记录
      responses:
        '200':
          $ref: '#/components/responses/ChatLogPageResponse'

  /api/app/v1/growth/profile:
    get:
      tags: [AppGrowth]
      summary: 我的成长档案
      responses:
        '200':
          $ref: '#/components/responses/GrowthProfileResponse'
  /api/app/v1/growth/timeline:
    get:
      tags: [AppGrowth]
      summary: 成长时间轴列表
      responses:
        '200':
          $ref: '#/components/responses/GrowthTimelineListResponse'
  /api/app/v1/growth/badges:
    get:
      tags: [AppGrowth]
      summary: 我的徽章列表
      responses:
        '200':
          $ref: '#/components/responses/BadgeListResponse'

  /api/admin/v1/dashboard/overview:
    get:
      tags: [AdminDashboard]
      summary: 仪表盘概览
      responses:
        '200':
          $ref: '#/components/responses/AdminOverviewResponse'
  /api/admin/v1/dashboard/income-trend:
    get:
      tags: [AdminDashboard]
      summary: 收入趋势
      parameters:
        - name: rangeType
          in: query
          required: true
          schema:
            type: string
            enum: [7d, 30d, month]
      responses:
        '200':
          $ref: '#/components/responses/TrendResponse'

  /api/admin/v1/courses:
    get:
      tags: [AdminCourse]
      summary: 后台课程列表
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/CoursePageResponse'
    post:
      tags: [AdminCourse]
      summary: 新增课程
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpsertRequest'
      responses:
        '200':
          $ref: '#/components/responses/CourseDetailResponse'
  /api/admin/v1/courses/{courseId}:
    get:
      tags: [AdminCourse]
      summary: 后台课程详情
      parameters:
        - $ref: '#/components/parameters/CourseId'
      responses:
        '200':
          $ref: '#/components/responses/CourseDetailResponse'
    put:
      tags: [AdminCourse]
      summary: 编辑课程
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpsertRequest'
      responses:
        '200':
          $ref: '#/components/responses/CourseDetailResponse'
  /api/admin/v1/courses/{courseId}/status:
    post:
      tags: [AdminCourse]
      summary: 上下架课程
      parameters:
        - $ref: '#/components/parameters/CourseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/admin/v1/students:
    get:
      tags: [AdminStudent]
      summary: 学员列表
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/UserPageResponse'
  /api/admin/v1/students/{userId}:
    get:
      tags: [AdminStudent]
      summary: 学员详情
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/StudentDetailResponse'
  /api/admin/v1/students/{userId}/profile:
    put:
      tags: [AdminStudent]
      summary: 更新学员标签与备注
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentProfileRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/admin/v1/coaches:
    get:
      tags: [AdminCoach]
      summary: 教练列表
      responses:
        '200':
          $ref: '#/components/responses/CoachPageResponse'
    post:
      tags: [AdminCoach]
      summary: 新增教练
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachUpsertRequest'
      responses:
        '200':
          $ref: '#/components/responses/CoachDetailResponse'
  /api/admin/v1/coaches/{coachId}:
    put:
      tags: [AdminCoach]
      summary: 编辑教练
      parameters:
        - $ref: '#/components/parameters/CoachId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachUpsertRequest'
      responses:
        '200':
          $ref: '#/components/responses/CoachDetailResponse'
  /api/admin/v1/coaches/{coachId}/workload:
    get:
      tags: [AdminCoach]
      summary: 教练课时统计
      parameters:
        - $ref: '#/components/parameters/CoachId'
      responses:
        '200':
          $ref: '#/components/responses/CoachWorkloadResponse'

  /api/admin/v1/schedules:
    get:
      tags: [AdminSchedule]
      summary: 团课排期列表
      parameters:
        - $ref: '#/components/parameters/PageNo'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          $ref: '#/components/responses/SchedulePageResponse'
    post:
      tags: [AdminSchedule]
      summary: 新增排期
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '200':
          $ref: '#/components/responses/ScheduleDetailResponse'
  /api/admin/v1/schedules/{scheduleId}/cancel:
    post:
      tags: [AdminSchedule]
      summary: 取消排期
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelScheduleRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
  /api/admin/v1/schedules/{scheduleId}/sign-in:
    post:
      tags: [AdminSchedule]
      summary: 团课批量签到销课
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleSignInRequest'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/admin/v1/lessons/consume:
    post:
      tags: [AdminSchedule]
