                        "body": ["Plus Jakarta Sans", "PingFang SC"],

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', 'PingFang SC', sans-serif;
            background-color: #f5f6f7;
            color: #2c2f30;
        }
        .headline-text {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-zinc-950 border-b border-zinc-100 dark:border-zinc-800/50 flex items-center px-4 h-14 w-full">
<div class="flex items-center w-full max-w-2xl mx-auto">
<button class="transition-opacity duration-200 active:scale-95 hover:opacity-80 text-orange-700 dark:text-orange-500 mr-4">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Lexend','PingFang_SC'] font-bold text-lg text-orange-700 dark:text-orange-500">申请退款</h1>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto space-y-6">
<!-- Course/Product Summary Card -->
<section class="bg-surface-container-lowest rounded-xl p-4 flex gap-4 items-center shadow-sm">
<div class="relative w-24 h-24 shrink-0 overflow-hidden rounded-xl bg-surface-container">
<img class="w-full h-full object-cover" data-alt="Close-up of high-quality gym equipment with dramatic orange lighting and focused depth of field on a rowing machine" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD656Ad4CWF25Rn-i2DB0GuuTgGDrLze8OAFtjW_neuzEM-Wlyn-sMq0rPl6sVuskH8JA-DqMkv7xlcsB5iNpebto5yzbiZtqhS7MJJtdK9NtyaSukoVshdCwWQsDe7VNgDA7H__pp-TleFXtuHdglVysKGiy2F0hxsC13Ndi4aOOnMX5fIUxWUNthZKjPlqD_8vhlb5hox29CA6NcQfzLdsMzK86dJVsGJC3sgPcVTMPVkMD14fCwCRhdOkCQO4iC6iBY3KG2pvYY"/>
</div>
<div class="flex flex-col justify-between h-24 py-1">
<div>
<h2 class="font-headline font-bold text-lg leading-tight text-on-surface">HIIT 高强度间歇训练：动力进阶课</h2>
<p class="text-on-surface-variant text-sm mt-1">课程周期：2024.05.20 - 2024.06.20</p>
</div>
<div class="flex items-center text-primary font-headline font-semibold">
<span class="text-xs mr-0.5">¥</span>
<span class="text-lg">1,280.00</span>
</div>
</div>
</section>
<!-- Refund Form Section -->
<div class="space-y-4">
<!-- Refund Reason Selection -->
<div class="bg-surface-container-lowest rounded-xl p-5 space-y-4">
<div class="flex items-center justify-between">
<span class="font-headline font-semibold text-on-surface">退款原因</span>
<span class="text-xs text-primary bg-on-primary px-2 py-1 rounded-full font-medium">必选</span>
</div>
<div class="grid grid-cols-1 gap-2">
<button class="flex items-center justify-between p-4 rounded-xl border border-surface-container transition-all active:scale-[0.98] bg-surface-container-low text-on-surface">
<span class="font-medium">计划有变，无法参加</span>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="flex items-center justify-between p-4 rounded-xl border border-transparent hover:border-surface-container-highest transition-all active:scale-[0.98] bg-surface-container-lowest text-on-surface-variant">
<span class="font-medium">选错商品/课程</span>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<button class="flex items-center justify-between p-4 rounded-xl border border-transparent hover:border-surface-container-highest transition-all active:scale-[0.98] bg-surface-container-lowest text-on-surface-variant">
<span class="font-medium">教练/顾问建议退款</span>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
<button class="flex items-center justify-between p-4 rounded-xl border border-transparent hover:border-surface-container-highest transition-all active:scale-[0.98] bg-surface-container-lowest text-on-surface-variant">
<span class="font-medium">其他个人原因</span>
<span class="material-symbols-outlined text-outline">radio_button_unchecked</span>
</button>
</div>
</div>
<!-- Refund Amount -->
<div class="bg-surface-container-lowest rounded-xl p-5 flex items-center justify-between">
<span class="font-headline font-semibold text-on-surface">退款金额</span>
<div class="text-right">
<div class="flex items-center justify-end text-primary font-headline font-bold text-xl">
<span class="text-sm mr-0.5">¥</span>
<span>1,280.00</span>
</div>
<p class="text-[10px] text-on-surface-variant mt-1">原支付金额：¥1,280.00 (实付)</p>
</div>
</div>
<!-- Detailed Explanation -->
<div class="bg-surface-container-lowest rounded-xl p-5 space-y-3">
<span class="font-headline font-semibold text-on-surface">退款说明</span>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none rounded-xl p-4 text-sm text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all resize-none" placeholder="请详细描述您退款的原因，以便我们更快为您处理..." rows="4"></textarea>
<div class="absolute bottom-3 right-3 text-[10px] text-outline font-headline">0 / 200</div>
</div>
</div>
<!-- Upload Proof (Optional addition for professional look) -->
<div class="bg-surface-container-lowest rounded-xl p-5 space-y-3">
<div class="flex items-center justify-between">
<span class="font-headline font-semibold text-on-surface">上传凭证</span>
<span class="text-[10px] text-outline">选填，最多3张</span>
</div>
<div class="flex gap-3">
<button class="w-20 h-20 rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center text-outline-variant hover:text-primary hover:border-primary/30 transition-colors">
<span class="material-symbols-outlined">add_a_photo</span>
</button>
</div>
</div>
</div>
<!-- Notification Note -->
<div class="p-4 bg-primary/5 rounded-xl border border-primary/10 flex gap-3">
<span class="material-symbols-outlined text-primary text-sm mt-0.5">info</span>
<p class="text-xs text-on-primary-container leading-relaxed">
                提交申请后，我们将在 1-3 个工作日内完成审核。审核通过后，资金将原路退回至您的支付账户。
            </p>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md px-4 pb-8 pt-4 border-t border-zinc-100 dark:border-zinc-800 flex justify-center z-50">
<div class="w-full max-w-2xl">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-[0_12px_24px_rgba(156,63,0,0.2)] transition-all duration-300 active:scale-95 flex items-center justify-center gap-2">
<span>提交申请</span>
<span class="material-symbols-outlined text-lg">send</span>
</button>
</div>
</footer>
</body></html>
