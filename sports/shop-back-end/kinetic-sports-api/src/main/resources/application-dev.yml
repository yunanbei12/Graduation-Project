server:
  port: 8086
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/kinetic_sports?allowMultiQueries=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 0
      maximum-pool-size: 20
      idle-timeout: 10000
      auto-commit: true
      connection-test-query: SELECT 1
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  # Sa-Token Redis 配置
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        default-requeue-rejected: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# 文件上传配置
file:
  upload-dir: ./uploads
  url-prefix: /uploads

# 阿里云短信配置（开发阶段可不配置，验证码将输出到控制台日志）
sms:
  access-key-id:
  access-key-secret:
  sign-name:
  template-code:

# 微信小程序配置
