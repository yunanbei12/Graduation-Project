</div>

</div>

</div>
</div>
<span class="px-2.5 py-1 rounded-md bg-primary/10 text-primary text-[11px] font-bold">已预约</span>

<div class="mt-4 flex justify-between items-center">

<span class="text-xs text-primary font-bold">¥</span>
